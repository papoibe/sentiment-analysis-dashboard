spring:
  application:
    name: sentiment-analysis-dashboard

  # H2 in-memory database - dung cho dev/demo (khong can cai PostgreSQL)
  datasource:
    url: jdbc:h2:mem:sentiment_dashboard;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    # Cho phep chay data.sql sau khi Hibernate tao schema
    defer-datasource-initialization: true

  # Cau hinh Spring Security mac dinh (dung cho H2 console)
  security:
    user:
      name: admin
      password: admin@12345

  # Cau hinh upload file (cho import CSV/Excel)
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080

# JWT Configuration - prefix "app.jwt" khop voi JwtProperties.java
app:
  jwt:
    secret: 94f27be08d95123d4c38217eeca292df283f5d5edc4936d5d5b746d88b0a9bd0
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000
